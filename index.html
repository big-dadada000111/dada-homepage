<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>大大的主页</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin: 10px 0;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .links {
            margin: 20px 0;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="card">
        < img src="https://api.dicebear.com/7.x/avataaars/svg?seed=dada" alt="头像">
        <h1>你好，我是大大 👋</h1>
        <p>我在西宁，正在学习 Web 开发。</p >
        <p>这是我的第一个网页！</p >
        
        <div class="links">
            <a href=" " target="_blank">GitHub</a > | 
            <a href="https://weibo.com" target="_blank">微博</a > |
            <a href="mailto:dada@example.com">邮箱</a >
        </div>
        
        <button onclick="alert('大大加油！💪')">点我</button>
    </div>
</body>
</html>
